# =============================================================================
# Stamp Detection - YOLOv9-S Training Configuration (MPS - Apple Silicon)
# =============================================================================
#
# Dataset: mapo80/stamps from HuggingFace
#   - Train: 20,857 images (16,503 positive + 4,354 negative)
#   - Val: 3,059 images (2,268 positive + 791 negative)
#   - 1 class (stamp), 28,101 train bboxes
#
# Model: YOLOv9-S (pretrained on COCO)
# Image size: 640x640
# Accelerator: MPS (Apple Silicon)
#
# Usage:
#   cd yolo-framework
#   python -m yolo.cli fit --config ../config_stamp.yaml
#
# =============================================================================

# -----------------------------------------------------------------------------
# Trainer Configuration
# -----------------------------------------------------------------------------
trainer:
  max_epochs: 300
  accelerator: mps
  devices: 1
  precision: 32                     # MPS requires 32-bit (no 16-mixed support)
  gradient_clip_val: 10.0
  accumulate_grad_batches: 1
  log_every_n_steps: 50
  check_val_every_n_epoch: 1

  # Callbacks
  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        dirpath: ../runs/stamp_v9s
        monitor: val/mAP
        mode: max
        save_top_k: 3
        save_last: true
        save_on_train_epoch_end: false
        filename: "stamp-epoch={epoch:02d}-mAP={val/mAP:.4f}"
        auto_insert_metric_name: false

    - class_path: lightning.pytorch.callbacks.EarlyStopping
      init_args:
        monitor: val/mAP
        mode: max
        patience: 50
        verbose: true
        check_on_train_epoch_end: false

    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: step

    - class_path: yolo.training.callbacks.YOLOProgressBar

    - class_path: yolo.training.callbacks.EvalDashboardCallback
      init_args:
        conf_prod: 0.25
        show_trends: true
        top_n_classes: 1

    - class_path: yolo.training.callbacks.EMACallback
      init_args:
        decay: 0.9999
        tau: 2000
        enabled: true

  # Logger
  logger:
    - class_path: lightning.pytorch.loggers.TensorBoardLogger
      init_args:
        save_dir: ../runs/
        name: stamp_v9s_logs

# -----------------------------------------------------------------------------
# Model Configuration
# -----------------------------------------------------------------------------
model:
  # Architecture
  model_config: v9-s
  num_classes: 1
  image_size: [640, 640]

  # Class names
  class_names:
    - stamp

  # Optimizer
  optimizer: sgd
  learning_rate: 0.01
  momentum: 0.937
  weight_decay: 0.0005

  # LR Scheduler
  lr_scheduler: cosine
  lr_min_factor: 0.01

  # Warmup
  warmup_epochs: 3
  warmup_momentum: 0.8
  warmup_bias_lr: 0.1

  # Loss weights
  box_loss_weight: 7.5
  cls_loss_weight: 0.5
  dfl_loss_weight: 0.5

  # Pretrained weights (transfer learning from COCO)
  weight_path: true

  # Layer Freezing
  freeze_backbone: false
  freeze_until_epoch: 0

  # NMS settings
  nms_conf_threshold: 0.25
  nms_iou_threshold: 0.65
  nms_max_detections: 50
  save_metrics_plots: true

# -----------------------------------------------------------------------------
# Data Configuration (YOLO Format)
# -----------------------------------------------------------------------------
data:
  # Dataset format and paths
  format: yolo
  root: ../data
  train_images: images/train
  train_labels: labels/train
  val_images: images/val
  val_labels: labels/val

  # DataLoader
  batch_size: 16                    # M2 Pro 32GB, precision=32, 640px
  num_workers: 4                    # macOS multiprocessing limit
  pin_memory: true

  # Multi-Image Augmentation
  mosaic_prob: 1.0
  mosaic_9_prob: 0.1
  mixup_prob: 0.15
  mixup_alpha: 8.0
  cutmix_prob: 0.0

  # Single-Image Augmentation (tuned for scanned documents)
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  degrees: 5.0
  translate: 0.1
  scale: 0.5
  shear: 0.0
  perspective: 0.0
  flip_lr: 0.5
  flip_ud: 0.5

  # Training Schedule
  close_mosaic_epochs: 15

  # Caching
  cache_labels: true
  cache_images: none
  cache_resize_images: true
  cache_max_memory_gb: 8.0
  cache_refresh: false
