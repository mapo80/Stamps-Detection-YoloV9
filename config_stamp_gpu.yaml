# =============================================================================
# Stamp Detection - YOLOv9-S Training Configuration (GPU - RunPod/Cloud)
# =============================================================================
#
# Dataset: mapo80/stamps from HuggingFace
#   - Train: 20,857 images (16,503 positive + 4,354 negative)
#   - Val: 3,059 images (2,268 positive + 791 negative)
#   - 1 class (stamp), 28,101 train bboxes
#   - Bbox sizes: 6.6% small, 80.8% medium, 12.7% large
#   - Median bbox: 134x102 px at 640px (normalized 0.21 x 0.16)
#
# Model: YOLOv9-S (pretrained on COCO)
# Image size: 640x640 (matches MDPI 2025 benchmark paper)
#
# Usage:
#   cd yolo-framework
#   python -m yolo.cli fit --config ../config_stamp_gpu.yaml
#
# =============================================================================

# -----------------------------------------------------------------------------
# Trainer Configuration
# -----------------------------------------------------------------------------
trainer:
  max_epochs: 300
  accelerator: gpu
  devices: 1
  precision: 16-mixed
  gradient_clip_val: 10.0
  accumulate_grad_batches: 1
  log_every_n_steps: 50
  check_val_every_n_epoch: 1

  # Callbacks
  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        dirpath: /workspace/Stamps-Detection-YoloV9/runs/stamp_v9s
        monitor: val/mAP
        mode: max
        save_top_k: 3
        save_last: true
        save_on_train_epoch_end: false
        filename: "stamp-epoch={epoch:02d}-mAP={val/mAP:.4f}"
        auto_insert_metric_name: false

    - class_path: lightning.pytorch.callbacks.EarlyStopping
      init_args:
        monitor: val/mAP
        mode: max
        patience: 50                  # Matches MDPI 2025 benchmark paper
        verbose: true
        check_on_train_epoch_end: false

    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: step

    - class_path: yolo.training.callbacks.YOLOProgressBar

    - class_path: yolo.training.callbacks.EvalDashboardCallback
      init_args:
        conf_prod: 0.25
        show_trends: true
        top_n_classes: 1

    - class_path: yolo.training.callbacks.EMACallback
      init_args:
        decay: 0.9999
        tau: 2000
        enabled: true

  # Logger
  logger:
    - class_path: lightning.pytorch.loggers.TensorBoardLogger
      init_args:
        save_dir: /workspace/Stamps-Detection-YoloV9/runs/
        name: stamp_v9s_logs

# -----------------------------------------------------------------------------
# Model Configuration
# -----------------------------------------------------------------------------
model:
  # Architecture
  model_config: v9-s
  num_classes: 1
  image_size: [640, 640]

  # Class names
  class_names:
    - stamp

  # Optimizer (matches MDPI 2025 benchmark)
  optimizer: sgd
  learning_rate: 0.01
  momentum: 0.937
  weight_decay: 0.0005

  # LR Scheduler
  lr_scheduler: cosine
  lr_min_factor: 0.01

  # Warmup
  warmup_epochs: 3
  warmup_momentum: 0.8
  warmup_bias_lr: 0.1

  # Loss weights (Ultralytics defaults: box=7.5, cls=1.5, dfl=0.5)
  box_loss_weight: 7.5              # Standard
  cls_loss_weight: 1.0              # Single class but needs good confidence calibration for FP reduction
  dfl_loss_weight: 0.5              # Ultralytics default (was incorrectly set to 1.5)

  # Pretrained weights (transfer learning from COCO)
  weight_path: true

  # Layer Freezing
  freeze_backbone: false
  freeze_until_epoch: 0

  # NMS settings
  nms_conf_threshold: 0.25
  nms_iou_threshold: 0.65
  nms_max_detections: 50            # Max stamps/image in dataset is 35
  save_metrics_plots: true

# -----------------------------------------------------------------------------
# Data Configuration (YOLO Format)
# -----------------------------------------------------------------------------
data:
  # Dataset format and paths
  format: yolo
  root: /workspace/Stamps-Detection-YoloV9/data
  train_images: images/train
  train_labels: labels/train
  val_images: images/val
  val_labels: labels/val

  # DataLoader
  batch_size: 32                    # Safe for T4 16GB at 640px. Override: --data.batch_size=64 (A100)
  num_workers: 8
  pin_memory: true

  # Multi-Image Augmentation
  mosaic_prob: 0.8                  # 80% mosaic — leave 20% real images for the model to learn actual layouts
  mosaic_9_prob: 0.0                # Disabled: 9-tile shrinks stamps too much at 640px
  mixup_prob: 0.0                   # Disabled: mixup confuses stamp/text boundaries on documents
  mixup_alpha: 8.0
  cutmix_prob: 0.0

  # Single-Image Augmentation (tuned for scanned documents)
  hsv_h: 0.015
  hsv_s: 0.3                       # Reduced: documents are mostly B/W or low-saturation
  hsv_v: 0.3                       # Reduced: avoid washing out faint stamps
  degrees: 10.0                    # Moderate rotation — stamps can be at slight angles
  translate: 0.15                  # Slightly more translate to handle stamp positions
  scale: 0.3                       # Reduced: avoid shrinking small stamps below detection threshold
  shear: 2.0                       # Slight shear — simulates scan perspective
  perspective: 0.0
  flip_lr: 0.5
  flip_ud: 0.0                     # Disabled: stamps have text/orientation, upside-down is unrealistic

  # Training Schedule
  close_mosaic_epochs: 20           # More epochs of clean images at the end for fine-tuning

  # Caching
  cache_labels: true
  cache_images: none                # Set to "ram" if you have >64GB RAM for faster training
  cache_resize_images: true
  cache_max_memory_gb: 16.0
  cache_refresh: false
